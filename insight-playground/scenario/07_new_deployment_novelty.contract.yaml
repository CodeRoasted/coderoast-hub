# 07_new_deployment_novelty
# Contract — what it asserts: Silence is honoured from t=0, and the newly-deployed service's novel logs are surfaced.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/07_new_deployment_novelty.yaml
  target_seconds: 300
  axis: time
  pyramid_config:
    raw_ring_capacity: 13
    ladder: { levels: 3 }
    raw_strides: [{ lookback_windows: 2 }, { lookback_windows: 5 }]
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75

signal:
  must_fire:
    - coordinate: RAW.acute . Seq . ngram_presence
      emits: NoveltyNGram
      scope: { template: "txn.processed" }
  baseline_arm:
    target_seconds: 150
    must_not_fire:
      - coordinate: RAW.acute . Seq . ngram_presence
        emits: NoveltyNGram
        scope: { template: "txn.processed" }

