# 38_spike_corroborant_control
# Scenario — what it does: The matched control for the spike-admission scenario.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: "spike-corroborant-control"
  seed: 3838
  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_spike_corrob_control
      shm_slot_count: 256
      shm_backpressure_policy: block

  time_axis:
    duration_seconds: 2050s
    agents:
      - name: api-svc
        intent: api_service
        rate_per_second: 30/s
        message_template: "request processed bucket {bucket} done"
        fields:
          - name: bucket
            generator: weighted_choice
            values: ["10", "90"]
            weights: [1.0, 0.0]
        phases:
          - name: warm
            duration_seconds: 550s
            rate_per_second: 30/s
          - name: drift
            duration_seconds: 1500s
            rate_per_second: 30/s
            field_weight_ramps:
              - field: bucket
                target_weights: [0.0, 1.0]
                window_seconds: 25
