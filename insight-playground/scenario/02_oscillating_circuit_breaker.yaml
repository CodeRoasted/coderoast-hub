# 02_oscillating_circuit_breaker
# Scenario — what it does: A circuit breaker that oscillates open/closed under intermittent downstream failure.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.
# Deterministic: the breaker's open/closed oscillation is DECLARED as a repeating incident schedule (four
# OPEN windows across the run) — the reproducible do-edge form of the old stochastic `health_state`
# machine. The old `auto_cascade` was a no-op (no `dependencies:`); its intent is now an explicit dampened
# effect on the api-gateway inside each window.

deterministic_scenario:
  name: "oscillating-circuit-breaker"
  seed: 202

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_osc_circuit_breaker
      shm_slot_count: 256
      shm_backpressure_policy: block
  duration_seconds: 90m

  environment:
    region: eu-west-1
    cluster: prod-payments
    version: v2.3.1

  agents:
    - name: payment-gateway
      intent: api_service
      rate_per_second: 80/s
      error_rate: 0.008    # CLOSED (healthy) baseline; the OPEN windows are declared as incidents below
      fields:
        - name: method
          generator: weighted_choice
          values: [POST, GET]
          weights: [70, 30]
        - name: path
          generator: weighted_choice
          values: ["/v2/payments/charge", "/v2/payments/refund", "/v2/payments/status"]
          weights: [55, 15, 30]
        - name: status_code
          generator: weighted_choice
          values: ["200", "202", "402", "503", "429"]
          weights: [84, 8, 3, 4, 1]
        - name: payment_id
          generator: sequence
          prefix: "PAY-"
          start: 880000
        - name: cb_state
          generator: weighted_choice
          values: ["CLOSED", "OPEN", "HALF-OPEN"]
          weights: [65, 28, 7]
        - name: upstream_ms
          generator: range
          min: 0
          max: 5000
          integer: true
      message_template: "{method} {path} pay={payment_id} -> {status_code} cb={cb_state}"

    - name: payment-processor
      intent: api_service
      rate_per_second: 60/s
      error_rate: 0.005    # CLOSED (healthy) baseline
      fields:
        - name: operation
          generator: weighted_choice
          values: ["authorize", "capture", "void", "refund"]
          weights: [45, 35, 10, 10]
        - name: result
          generator: weighted_choice
          values: ["approved", "declined", "timeout", "error"]
          weights: [87, 8, 3, 2]
        - name: provider
          generator: weighted_choice
          values: ["stripe", "adyen", "braintree"]
          weights: [60, 25, 15]
      message_template: "{operation} via {provider}: {result}"

    - name: api-gateway
      intent: api_service
      rate_per_second: 120/s
      error_rate: 0.003

      fields:
        - name: path
          generator: weighted_choice
          values: ["/checkout", "/order/confirm", "/cart/pay"]
          weights: [50, 30, 20]
        - name: status_code
          generator: weighted_choice
          values: ["200", "201", "400", "503"]
          weights: [88, 6, 4, 2]
        - name: user_id
          generator: range
          min: 1000
          max: 99999
          integer: true
      message_template: "POST {path} user={user_id} -> {status_code}"

    - name: circuit-breaker-audit
      intent: background_worker
      rate_per_second: 1/s

      fields:
        - name: from_state
          generator: weighted_choice
          values: ["CLOSED", "OPEN", "HALF-OPEN"]
          weights: [50, 30, 20]
        - name: to_state
          generator: weighted_choice
          values: ["CLOSED", "OPEN", "HALF-OPEN"]
          weights: [40, 40, 20]
        - name: reason
          generator: weighted_choice
          values: ["failure_threshold", "timeout_elapsed", "probe_success", "probe_fail"]
          weights: [35, 30, 20, 15]
      message_template: "CircuitBreaker transition {from_state} -> {to_state} reason={reason}"

  # The breaker oscillation, DECLARED: four OPEN windows across the 90m run. In each, the gateway fast-fails
  # (error 0.98, latency ×0.05 — an open breaker returns immediately) and the processor saturates (error
  # 0.60, latency ×15), and the failure propagates dampened (≈0.4) onto the api-gateway (0.24). Between
  # windows the breaker is CLOSED (baseline). This is the deterministic do-edge form of the old stochastic
  # health_state oscillation — same four-state pathology (healthy ⇄ failing), reproducibly placed.
  incidents:
    - name: breaker_open_1
      trigger: "time > 12m"
      duration_seconds: 4m
      effects:
        - { target: payment-gateway, error_rate: 0.98, latency_multiplier: 0.05 }
        - { target: payment-processor, error_rate: 0.60, latency_multiplier: 15.0 }
        - { target: api-gateway, error_rate: 0.24 }
    - name: breaker_open_2
      trigger: "time > 34m"
      duration_seconds: 4m
      effects:
        - { target: payment-gateway, error_rate: 0.98, latency_multiplier: 0.05 }
        - { target: payment-processor, error_rate: 0.60, latency_multiplier: 15.0 }
        - { target: api-gateway, error_rate: 0.24 }
    - name: breaker_open_3
      trigger: "time > 56m"
      duration_seconds: 4m
      effects:
        - { target: payment-gateway, error_rate: 0.98, latency_multiplier: 0.05 }
        - { target: payment-processor, error_rate: 0.60, latency_multiplier: 15.0 }
        - { target: api-gateway, error_rate: 0.24 }
    - name: breaker_open_4
      trigger: "time > 76m"
      duration_seconds: 4m
      effects:
        - { target: payment-gateway, error_rate: 0.98, latency_multiplier: 0.05 }
        - { target: payment-processor, error_rate: 0.60, latency_multiplier: 15.0 }
        - { target: api-gateway, error_rate: 0.24 }
