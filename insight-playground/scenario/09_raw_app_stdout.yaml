# 09_raw_app_stdout
# Scenario — what it does: Raw, unstructured application stdout — no JSON, no fields.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: insight-raw-app-stdout
  seed: 909

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_raw_stdout
      format: raw
      shm_slot_count: 256
      shm_backpressure_policy: block

  time_axis:
    duration_seconds: 3m
    agents:
      - name: checkout-service
        intent: api_service
        message_template: "checkout completed order={order_id} amount={amount} in {dur}ms"
        fields:
          - name: order_id
            generator: sequence
            prefix: "ORD-"
            start_value: 100000
          - name: amount
            generator: range
            min: 5
            max: 5000
            integer: true
          - name: dur
            generator: range
            min: 4
            max: 90
            integer: true
        phases:
          - name: steady
            duration_seconds: 3m
            rate_per_second: 10/s

      - name: db-pool
        intent: api_service
        message_template: "connection refused to db {host} after {retries} retries"
        fields:
          - name: host
            generator: weighted_choice
            values: [db-01, db-02, db-03]
            weights: [50, 30, 20]
          - name: retries
            generator: range
            min: 1
            max: 5
            integer: true
        phases:
          - name: quiet
            duration_seconds: 1m
            rate_per_second: 0/s
          - name: failing
            duration_seconds: 1m
            rate_per_second: 5/s
            error_rate: 1.0
          - name: recovered
            duration_seconds: 1m
            rate_per_second: 0/s

# ── The bundled contract (unified grammar, axis-dsl §4.3) ─────────────────────────────────────
# `positions:` are the claim ANCHORS — each a named coordinate vector plus the border read AT
# it. The instrument below is what every one of those claims is pinned to.
contract_scenario:
  reference_scenario: insight-raw-app-stdout
  pyramid_config:
    raw_ring_capacity: 13
    ladder:
      levels: 1
    raw_strides: []
  explain_min_confidence: 0.75
  windows:
    mode: segmented
  positions:
  - name: baseline
    coordinates:
      time_axis: 60s
    signal:
      must_not_fire:
      - "* . * . *"
  - name: onset
    coordinates:
      time_axis: 120s
    signal:
      must_fire:
      - coordinate: RAW.acute . Nep . acute_new_templates
        scope:
          template: "connection refused"
        polarity: onset
      must_not_fire:
      - RAW.acute . Spk . template_count
  - name: recovery
    coordinates:
      time_axis: 180s
    signal:
      must_fire:
      - coordinate: RAW.acute . Seq . ngram_presence
        emits: VanishedTemplate
        scope:
          template: "connection refused"
        polarity: recovery
      must_not_fire:
      - RAW.acute . Nep . acute_new_templates

    interpretation:
      cube_a:
        upper:
        - level: ERROR
      composite:
        severity: High
      must_not_emit:
      - severity: Critical
