# 06_multi_service_cascade
# Scenario — what it does: A failure in one service propagating across the services that depend on it.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

scenario:
  name: insight-multi-service-cascade
  seed: 42

  clock:
    mode: virtual
  duration_seconds: 20m

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_svc_cascade
      shm_slot_count: 256
      shm_backpressure_policy: block

  agents:
    - name: web-frontend
      intent: web_server
      rate_per_second: 25.0
      message_template: "{method} {path} -> {status_code}"
      fields:
        - name: method
          generator: weighted_choice
          values: [GET, POST]
          weights: [75, 25]
        - name: path
          generator: weighted_choice
          values: [/shop, /cart, /orders, /account]
          weights: [50, 25, 15, 10]
        - name: status_code
          generator: weighted_choice
          values: ["200", "201", "400", "503"]
          weights: [85, 8, 5, 2]

    - name: order-api
      intent: api_service
      rate_per_second: 30.0
      message_template: "{operation} order={order_id} -> {status}"
      fields:
        - name: operation
          generator: weighted_choice
          values: [create_order, get_order, update_order, cancel_order]
          weights: [40, 35, 15, 10]
        - name: order_id
          generator: sequence
          start: 50000
        - name: status
          generator: weighted_choice
          values: [ok, validation_failed, db_timeout, internal_error]
          weights: [90, 5, 3, 2]

    - name: postgres-db
      intent: database
      rate_per_second: 18.0
      message_template: "{query_type} {table} duration={duration_ms}ms -> {result}"
      fields:
        - name: query_type
          generator: weighted_choice
          values: [SELECT, INSERT, UPDATE, DELETE]
          weights: [55, 25, 15, 5]
        - name: table
          generator: weighted_choice
          values: [orders, order_items, customers, inventory]
          weights: [40, 30, 20, 10]
        - name: duration_ms
          generator: range
          min: 1
          max: 30
          integer: true
        - name: result
          generator: weighted_choice
          values: [ok, slow_query]
          weights: [98, 2]
      phases:
        - name: healthy
          duration_seconds: 5m
          rate_per_second: 18/s
          error_rate: 0.0
        - name: overloaded
          duration_seconds: 10m
          rate_per_second: 180/s
          error_rate: 0.70
          latency_ms:
            distribution: percentile
            p50: 3500
            p95: 12000
            p99: 30000
        - name: recovering
          duration_seconds: 5m
          rate_per_second: 22/s
          error_rate: 0.03

  auto_cascade:
    error_threshold: 0.35
    dampening_factor: 0.45
    blast_radius: 2
