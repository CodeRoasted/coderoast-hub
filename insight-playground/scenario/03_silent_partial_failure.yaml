# 03_silent_partial_failure
# Scenario — what it does: A service where a subset of requests fail while the aggregate still looks healthy.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: "silent-partial-failure-instance-freeze"
  seed: 42

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_silent_partial
      shm_slot_count: 256
      shm_backpressure_policy: block
  time_axis:
    duration_seconds: 90m
    environment:
      region: us-west-2
      cluster: prod-batch
      queue: job-processing-queue
      version: v1.8.4

    agents:
      - name: worker-01
        intent: background_worker
        rate_per_second: 15/s
        error_rate: 0.005
        fields:
          - name: job_type
            generator: weighted_choice
            values: ["encode_video", "resize_image", "generate_thumbnail", "transcode_audio"]
            weights: [35, 30, 25, 10]
          - name: job_id
            generator: sequence
            start_value: 10000
          - name: duration_ms
            generator: range
            min: 50
            max: 8000
            integer: true
          - name: outcome
            generator: weighted_choice
            values: ["success", "retry", "failed"]
            weights: [94, 4, 2]
        message_template: "worker=01 {job_type} job={job_id} duration={duration_ms}ms -> {outcome}"

      - name: worker-02
        intent: background_worker
        rate_per_second: 15/s
        error_rate: 0.005
        fields:
          - name: job_type
            generator: weighted_choice
            values: ["encode_video", "resize_image", "generate_thumbnail", "transcode_audio"]
            weights: [35, 30, 25, 10]
          - name: job_id
            generator: sequence
            start_value: 20000
          - name: duration_ms
            generator: range
            min: 50
            max: 8000
            integer: true
          - name: outcome
            generator: weighted_choice
            values: ["success", "retry", "failed"]
            weights: [94, 4, 2]
        message_template: "worker=02 {job_type} job={job_id} duration={duration_ms}ms -> {outcome}"

      - name: worker-03
        intent: background_worker
        rate_per_second: 15/s
        error_rate: 0.005
        fields:
          - name: job_type
            generator: weighted_choice
            values: ["encode_video", "resize_image", "generate_thumbnail", "transcode_audio"]
            weights: [35, 30, 25, 10]
          - name: job_id
            generator: sequence
            start_value: 30000
          - name: duration_ms
            generator: range
            min: 50
            max: 8000
            integer: true
          - name: outcome
            generator: weighted_choice
            values: ["success", "retry", "failed"]
            weights: [94, 4, 2]
        message_template: "worker=03 {job_type} job={job_id} duration={duration_ms}ms -> {outcome}"

      - name: worker-04
        intent: background_worker
        error_rate: 0.005
        fields:
          - name: job_type
            generator: weighted_choice
            values: ["encode_video", "resize_image", "generate_thumbnail", "transcode_audio"]
            weights: [35, 30, 25, 10]
          - name: job_id
            generator: sequence
            start_value: 40000
          - name: duration_ms
            generator: range
            min: 50
            max: 8000
            integer: true
          - name: outcome
            generator: weighted_choice
            values: ["success", "retry", "failed"]
            weights: [94, 4, 2]
        message_template: "worker=04 {job_type} job={job_id} duration={duration_ms}ms -> {outcome}"
        phases:
          - name: normal
            duration_seconds: 30m
            rate_per_second: 15/s
          - name: frozen
            duration_seconds: 60m
            rate_per_second: 0.001/s

      - name: queue-monitor
        intent: background_worker
        rate_per_second: 1/s
        error_rate: 0.0

        state:
          backlog:
            initial: 100
            max_value: 50000
            growth_per_request: 0.0

        fields:
          - name: queue_depth
            generator: range
            min: 80
            max: 120
            integer: true
          - name: workers_active
            generator: weighted_choice
            values: ["4", "3"]
            weights: [50, 50]
          - name: throughput_eps
            generator: range
            min: 55
            max: 65
            integer: true
        message_template: "queue depth={queue_depth} workers={workers_active} throughput={throughput_eps}/s"

      - name: queue-manager
        intent: background_worker
        rate_per_second: 0.5/s
        fields:
          - name: event
            generator: weighted_choice
            values: ["lease_renewed", "lease_expired", "consumer_registered", "consumer_deregistered"]
            weights: [70, 15, 10, 5]
          - name: consumer_id
            generator: weighted_choice
            values: ["worker-01", "worker-02", "worker-03", "worker-04"]
            weights: [25, 25, 25, 25]
        message_template: "QueueManager {event} consumer={consumer_id}"

    incidents:
      - name: worker04_lease_timeout
        trigger: "time > 35m"
        duration_seconds: 0
        effects:
          - target: queue-manager
            error_rate: 0.20

# ── The bundled contract (unified grammar, axis-dsl §4.3) ─────────────────────────────────────
# `positions:` are the claim ANCHORS — each a named coordinate vector plus the border read AT
# it. The instrument below is what every one of those claims is pinned to.
contract_scenario:
  reference_scenario: silent-partial-failure-instance-freeze
  pyramid_config:
    raw_ring_capacity: 13
    ladder:
      levels: 3
    raw_strides:
    - lookback_windows: 2
    - lookback_windows: 5
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  positions:
  - name: frozen
    coordinates:
      time_axis: 2000s
    signal:
      must_fire: []
      must_not_fire:
      - RAW.acute . Spk . template_count
      - RAW.acute . Nep . acute_new_templates

    interpretation:
      must_not_emit:
      - any: true
