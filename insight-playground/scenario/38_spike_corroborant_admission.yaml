# 38_spike_corroborant_admission
# Scenario — what it does: A count spike accompanied by a corroborating distributional signal.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

scenario:
  name: "spike-corroborant-admission"
  seed: 3838
  clock:
    mode: virtual
  duration_seconds: 2050s

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_spike_corrob
      shm_slot_count: 256
      shm_backpressure_policy: block

  agents:
    - name: api-svc
      intent: api_service
      rate_per_second: 30/s
      message_template: "request processed bucket {bucket} done"
      fields:
        - name: bucket
          generator: weighted_choice
          values: ["10", "90"]
          weights: [1.0, 0.0]
      phases:
        - name: warm
          duration_seconds: 550s
          rate_per_second: 30/s
        - name: drift
          duration_seconds: 1500s
          rate_per_second: 30/s
          field_weight_ramps:
            - field: bucket
              target_weights: [0.0, 1.0]
              window_seconds: 25

    - name: api-burst
      intent: api_service
      rate_per_second: 900/s
      start_delay_seconds: 1700
      message_template: "request processed bucket {bucket} done"
      fields:
        - name: bucket
          generator: weighted_choice
          values: ["10", "90"]
          weights: [0.0, 1.0]
      phases:
        - name: burst
          duration_seconds: 50s
          rate_per_second: 900/s
        - name: silent
          duration_seconds: 300s
          rate_per_second: 0/s
