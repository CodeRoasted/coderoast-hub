# 35_ordinal_drift_w1
# Contract — what it asserts: The ordinal distribution shift is measured.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  axis: diff
  inputs:
    baseline: scenario/35_ordinal_drift_w1/lat_fast.jsonl
    changed:  scenario/35_ordinal_drift_w1/lat_slow.jsonl
  criticite:
    kind: invariant

interpretation:
  ranked_changes:
    must_fire:
      - { kind: OrdinalDrift, polarity: regression, shift: HIGH, template: "db query completed" }
    must_not_emit:
      - { kind: FieldShift, template: "db query completed" }
    attributable_to: ["latency_ms"]

arms:
  - name: recovery
    inputs:
      baseline: scenario/35_ordinal_drift_w1/lat_slow.jsonl
      changed:  scenario/35_ordinal_drift_w1/lat_fast.jsonl
    interpretation:
      ranked_changes:
        must_fire:
          - { kind: OrdinalDrift, polarity: recovery, shift: HIGH, template: "db query completed" }
        must_not_emit:
          - { kind: FieldShift, template: "db query completed" }
        attributable_to: ["latency_ms"]

  - name: within_noise
    inputs:
      baseline: scenario/35_ordinal_drift_w1/lat_fast.jsonl
      changed:  scenario/35_ordinal_drift_w1/lat_noise.jsonl
    interpretation:
      ranked_changes:
        must_not_emit:
          - { kind: OrdinalDrift, template: "db query completed" }
          - { kind: FieldShift,   template: "db query completed" }

