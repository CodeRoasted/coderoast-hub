# 07_new_deployment_novelty
# Scenario — what it does: A service that is silent (not yet deployed) through phase 1, then starts emitting a new log shape.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: insight-new-deployment-novelty
  seed: 42

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_deploy_novelty
      shm_slot_count: 256
      shm_backpressure_policy: block

  time_axis:
    duration_seconds: 10m
    agents:
      - name: payment-service-v1
        intent: api_service
        message_template: "payment {status} amount={amount} ref={ref}"
        fields:
          - name: status
            generator: weighted_choice
            values: [approved, declined, pending, failed]
            weights: [82, 10, 5, 3]
          - name: amount
            generator: range
            min: 1
            max: 50000
            integer: true
          - name: ref
            generator: sequence
            start_value: 1000
        phases:
          - name: active
            duration_seconds: 3m
            rate_per_second: 60/s
          - name: rolling_out
            duration_seconds: 4m
            rate_per_second: 15/s
          - name: decommissioned
            duration_seconds: 3m
            rate_per_second: 0.01/s

      - name: payment-service-v2
        intent: api_service
        message_template: "txn.processed txn_id={txn_id} amount={amount} currency={currency} result={result}"
        fields:
          - name: txn_id
            generator: sequence
            start_value: 900000
          - name: amount
            generator: range
            min: 1
            max: 50000
            integer: true
          - name: currency
            generator: weighted_choice
            values: [USD, EUR, GBP, JPY]
            weights: [60, 25, 10, 5]
          - name: result
            generator: weighted_choice
            values: [approved, declined, pending, failed]
            weights: [83, 10, 4, 3]
        phases:
          - name: not_deployed
            duration_seconds: 3m
            rate_per_second: 0.0/s
          - name: canary
            duration_seconds: 4m
            rate_per_second: 80/s
          - name: full_traffic
            duration_seconds: 3m
            rate_per_second: 70/s

      - name: audit-logger
        intent: background_worker
        rate_per_second: 5.0
        message_template: "audit action={action} user={user_id} ok={ok}"
        fields:
          - name: action
            generator: weighted_choice
            values: [read, write, delete, auth]
            weights: [50, 30, 10, 10]
          - name: user_id
            generator: range
            min: 1000
            max: 9999
            integer: true
          - name: ok
            generator: weighted_choice
            values: ["true", "false"]
            weights: [95, 5]

# ── The bundled contract (unified grammar, axis-dsl §4.3) ─────────────────────────────────────
# `positions:` are the claim ANCHORS — each a named coordinate vector plus the border read AT
# it. The instrument below is what every one of those claims is pinned to.
contract_scenario:
  reference_scenario: insight-new-deployment-novelty
  pyramid_config:
    raw_ring_capacity: 13
    ladder:
      levels: 3
    raw_strides:
    - lookback_windows: 2
    - lookback_windows: 5
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  positions:
  - name: pre-deploy
    coordinates:
      time_axis: 150s
    signal:
      must_not_fire:
      - coordinate: RAW.acute . Seq . ngram_presence
        emits: NoveltyNGram
        scope:
          template: "txn.processed"

  - name: deployed
    coordinates:
      time_axis: 300s
    signal:
      must_fire:
      - coordinate: RAW.acute . Seq . ngram_presence
        emits: NoveltyNGram
        scope:
          template: "txn.processed"
