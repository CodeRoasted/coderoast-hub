# 39_branch_a_composite
# Contract — what it asserts: The composite of the two shifts is classified, with a matched silent control.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/39_branch_a_composite.yaml
  target_seconds: 2050
  axis: time
  pyramid_config:
    ladder: { levels: 3, ring_depth: 4 }
    raw_strides: [{ lookback_windows: 2 }, { lookback_windows: 5 }]
    disjoint: [{ level: 2, separation: 1 }, { level: 2, separation: 3 }]
  metalog_config: { top_k_size: 128, max_param_histograms: 4, max_histogram_values: 8 }
  sequence: { branching_delta_threshold_bits: 3.5 }
  explain_min_confidence: 0.75

signal:
  must_fire:
    - RAW.acute . Dps . dominant_path
    - DISJOINT.L2.s3 . Fld.dist . field_jsd
    - envelope . Cmp(branch=A) . fired_set
  control_arms:
    - name: no_branch_shift
      scenario: scenario/39_branch_a_control.yaml
      must_fire:
        - DISJOINT.L2.s3 . Fld.dist . field_jsd
      must_not_fire:
        - envelope . Cmp(branch=A) . fired_set
    - name: agent_drift_diag
      scenario: scenario/39_diag_agent_drift.yaml
      must_fire:
        - DISJOINT.L2.s3 . Fld.dist . field_jsd
