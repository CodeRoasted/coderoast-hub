# 04_incident_recovery_cycle
# Contract — what it asserts: Onset is flagged and the window returns to baseline after recovery.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/04_incident_recovery_cycle.yaml
  target_seconds: 120
  axis: time
  pyramid_config:
    raw_ring_capacity: 13
    ladder: { levels: 3 }
    raw_strides: [{ lookback_windows: 2 }, { lookback_windows: 5 }]
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  criticite:
    kind: invariant
  seeds: [42]

signal:
  must_fire: []
  must_not_fire:
    - RAW.acute . Spk . template_count
    - RAW.acute . Nep . acute_new_templates

interpretation:
  must_not_emit:
    - { severity: High }
    - { severity: Critical }

