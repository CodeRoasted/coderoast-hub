# 31_do_operator_noise
# Contract — what it asserts: Causal attribution survives the noise.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  axis: do
  do_pair:
    factual:        scenario/31_do_operator_noise/factual.yaml
    counterfactual: scenario/31_do_operator_noise/ablated.yaml
  target_seconds: 10
  criticite:
    kind: invariant
  seeds: [3131]

do:
  causal:
    intervention: { kind: ablate_incident, target: { incident: payments_outage } }
    expect:
      collapses:
        - cube_a: { level: ERROR, where: [payments] }
      reappears_as:
        - cube_a: { level: INFO, where: [payments] }

  control:
    intervention: { kind: ablate_incident, target: { incident: payments_outage } }
    invariant:
      - cube_a: { level: ERROR, where: [notifier] }

  minimal_intervention:
    untouched_projection: { exclude_where: [payments] }

