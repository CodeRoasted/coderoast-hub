# 34_otel_trace_scope_depollution
# Scenario — what it does: OTEL trace-scoped logs where noise from one trace could pollute another.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: insight-otel-trace-scope-depollution
  seed: 42

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_otel_depollution
      shm_slot_count: 512
      shm_backpressure_policy: block
      format: otel

  time_axis:
    duration_seconds: 10m
    agents:
      - name: heartbeat
        intent: background_worker
        rate_per_second: 40/s
        error_rate: 0.0
        log_level: info
        message_template: "heartbeat ok"

      - name: alpha-svc
        intent: flow_service
        rate_per_second: 0
        error_rate: 0.0
        log_level: info
      - name: beta-svc
        intent: flow_service
        rate_per_second: 0
        error_rate: 0.0
        log_level: info

    flows:
      - name: alpha
        instance_rate_per_second: 25/s
        start_delay_seconds: 180s
        max_concurrent: 64
        correlation_field: trace_id
        start: a_receive
        states:
          a_receive: {agent: alpha-svc, message_template: "alpha receive"}
          a_process: {agent: alpha-svc, message_template: "alpha process"}
          a_commit: {agent: alpha-svc, message_template: "alpha commit"}
        transitions:
          - {from: a_receive, to: a_process, network_latency_ms: 80}
          - {from: a_process, to: a_commit, network_latency_ms: 80}

      - name: beta
        instance_rate_per_second: 25/s
        start_delay_seconds: 180s
        max_concurrent: 64
        correlation_field: trace_id
        start: b_open
        states:
          b_open: {agent: beta-svc, message_template: "beta open"}
          b_query: {agent: beta-svc, message_template: "beta query"}
          b_close: {agent: beta-svc, message_template: "beta close"}
        transitions:
          - {from: b_open, to: b_query, network_latency_ms: 80}
          - {from: b_query, to: b_close, network_latency_ms: 80}

# ── The bundled contract (unified grammar, axis-dsl §4.3) ─────────────────────────────────────
# `positions:` are the claim ANCHORS — each a named coordinate vector plus the border read AT
# it. The instrument below is what every one of those claims is pinned to.
contract_scenario:
  reference_scenario: insight-otel-trace-scope-depollution
  pyramid_config:
    raw_ring_capacity: 13
    ladder:
      levels: 3
    raw_strides:
    - lookback_windows: 2
    - lookback_windows: 5
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  positions:
  - name: interleaved
    coordinates:
      time_axis: 300s
    signal:
      must_fire:
      - coordinate: RAW.acute . Seq . ngram_presence
        emits: NoveltyNGram
        scope:
          template: "alpha process alpha commit"

  # THE ABLATION, as a POSITION — the same concurrent OTLP stream read with trace-scoping off. The
  # within-trace n-gram is then lost to the global-order interleave, which is the de-pollution's
  # whole point: the contrast between two observers over ONE world. `metalog_config:` cascades onto
  # the contract instrument, so only the ablated knob is stated and both positions share one replay.
  - name: global-order
    coordinates:
      time_axis: 300s
    metalog_config:
      trace_scoping_enabled: false
    signal:
      must_not_fire:
      - coordinate: RAW.acute . Seq . ngram_presence
        emits: NoveltyNGram
        scope:
          template: "alpha process alpha commit"
