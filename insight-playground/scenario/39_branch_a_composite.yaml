# 39_branch_a_composite
# Scenario — what it does: Two structural shifts — a branching change and a slow drift — that together form a composite.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: "branch-a-composite"
  seed: 3939
  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_branch_a
      shm_slot_count: 256
      shm_backpressure_policy: block

  time_axis:
    duration_seconds: 2050s
    agents:
      - name: svc
        intent: service
        rate_per_second: 0/s
      - name: hb
        intent: service
        rate_per_second: 50/s
        message_template: "heartbeat ok"

    flows:
      - name: walk
        instance_rate_per_second: 50/s
        start: process
        states:
          process: {agent: svc, message_template: "request bucket {bucket} processed", fields: [{name: bucket, generator: weighted_choice, values: ["10", "90"], weights: [1.0, 0.0]}]}
          step_01: {agent: svc, message_template: "step_01"}
          step_02: {agent: svc, message_template: "step_02"}
          step_03: {agent: svc, message_template: "step_03"}
          step_04: {agent: svc, message_template: "step_04"}
          step_05: {agent: svc, message_template: "step_05"}
          step_06: {agent: svc, message_template: "step_06"}
          step_07: {agent: svc, message_template: "step_07"}
          step_08: {agent: svc, message_template: "step_08"}
          step_09: {agent: svc, message_template: "step_09"}
          step_10: {agent: svc, message_template: "step_10"}
          step_11: {agent: svc, message_template: "step_11"}
          step_12: {agent: svc, message_template: "step_12"}
          step_13: {agent: svc, message_template: "step_13"}
          step_14: {agent: svc, message_template: "step_14"}
          step_15: {agent: svc, message_template: "step_15"}
          step_16: {agent: svc, message_template: "step_16"}
        transitions:
          - {from: process, to: step_01, weight: 1.0}
          - {from: process, to: step_02, weight: 1.0}
          - {from: process, to: step_03, weight: 1.0}
          - {from: process, to: step_04, weight: 1.0}
          - {from: process, to: step_05, weight: 1.0}
          - {from: process, to: step_06, weight: 1.0}
          - {from: process, to: step_07, weight: 1.0}
          - {from: process, to: step_08, weight: 1.0}
          - {from: process, to: step_09, weight: 1.0}
          - {from: process, to: step_10, weight: 1.0}
          - {from: process, to: step_11, weight: 1.0}
          - {from: process, to: step_12, weight: 1.0}
          - {from: process, to: step_13, weight: 1.0}
          - {from: process, to: step_14, weight: 1.0}
          - {from: process, to: step_15, weight: 1.0}
          - {from: process, to: step_16, weight: 1.0}
        field_weight_ramps:
          - state: process
            field: bucket
            target_weights: [0.0, 1.0]
            start_seconds: 550s
            duration_seconds: 1500s
            window_seconds: 25
        branch_weight_ramps:
          - from: process
            schedule:
              - at_seconds: 0
                weights: {step_01: 1}
              - at_seconds: 1700s
                weights: {step_01: 1, step_02: 1, step_03: 1, step_04: 1, step_05: 1, step_06: 1, step_07: 1, step_08: 1, step_09: 1, step_10: 1, step_11: 1, step_12: 1, step_13: 1, step_14: 1, step_15: 1, step_16: 1}
