# 25_cube_emerging_border_bred
# Contract — what it asserts: The newly-appeared combinations are pinpointed exactly, with no over-pointing (a diagnosticity gate).
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  axis: build
  cube_input:
    emit_cube: true
  criticite:
    kind: invariant
  recall_floor: 0.95
  mispoint_ceiling: 0.05

classes:
  - difficulty: single-generator
    inputs:
      baseline: scenario/25_cube_emerging_border_bred/single_generator/baseline.jsonl
      changed:  scenario/25_cube_emerging_border_bred/single_generator/changed.jsonl
    interpretation:
      cube_a:
        upper:
          - { where: [cache] }

  - difficulty: multi-generator-antichain
    inputs:
      baseline: scenario/25_cube_emerging_border_bred/multi_generator/baseline.jsonl
      changed:  scenario/25_cube_emerging_border_bred/multi_generator/changed.jsonl
    interpretation:
      cube_a:
        upper:
          - { level: FATAL }
          - { role: Terminator }

  - difficulty: diffuse-near-cap
    inputs:
      baseline: scenario/25_cube_emerging_border_bred/diffuse_near_cap/baseline.jsonl
      changed:  scenario/25_cube_emerging_border_bred/diffuse_near_cap/changed.jsonl
    interpretation:
      cube_a:
        upper:
          - { where: [svc01] }
          - { where: [svc02] }
          - { where: [svc03] }
          - { where: [svc04] }
          - { where: [svc05] }
          - { where: [svc06] }
          - { where: [svc07] }
          - { where: [svc08] }
          - { where: [svc09] }
          - { where: [svc10] }
          - { where: [svc11] }
          - { where: [svc12] }
          - { where: [svc13] }
          - { where: [svc14] }
          - { where: [svc15] }
          - { where: [svc16] }

  - difficulty: ambiguous-equal
    inputs:
      baseline: scenario/25_cube_emerging_border_bred/ambiguous_equal/baseline.jsonl
      changed:  scenario/25_cube_emerging_border_bred/ambiguous_equal/changed.jsonl
    interpretation:
      cube_a:
        upper:
          - { where: [blue] }
          - { where: [green] }

