# 05_sudden_traffic_spike
# Scenario — what it does: A sudden step-up in request volume with no structural change to the logs.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: insight-sudden-traffic-spike
  seed: 42

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_traffic_spike
      shm_slot_count: 256
      shm_backpressure_policy: block

  time_axis:
    duration_seconds: 15m
    agents:
      - name: checkout-api
        intent: web_server
        rate_per_second: 30.0
        message_template: "{method} {path} -> {status_code}"
        fields:
          - name: method
            generator: weighted_choice
            values: [GET, POST]
            weights: [70, 30]
          - name: path
            generator: weighted_choice
            values: [/checkout, /cart, /products, /search]
            weights: [40, 25, 25, 10]
          - name: status_code
            generator: weighted_choice
            values: ["200", "201", "400", "429", "500"]
            weights: [80, 10, 5, 3, 2]
        phases:
          - name: normal
            duration_seconds: 3m
            rate_per_second: 30/s
          - name: viral_surge
            duration_seconds: 7m
            rate_per_second: 250/s
            error_rate: 0.15
          - name: recovery
            duration_seconds: 5m
            rate_per_second: 35/s

      - name: inventory-service
        intent: api_service
        rate_per_second: 15.0
        message_template: "lookup sku={sku} qty={qty} -> {result}"
        fields:
          - name: sku
            generator: weighted_choice
            values: ["SKU-44021", "SKU-44022", "SKU-10711", "SKU-90014", "SKU-33180", "SKU-58007"]
            weights: [70, 12, 8, 5, 3, 2]
          - name: qty
            generator: range
            min: 1
            max: 10
            integer: true
          - name: result
            generator: weighted_choice
            values: [in_stock, low_stock, out_of_stock]
            weights: [70, 20, 10]
        phases:
          - name: normal
            duration_seconds: 3m
            rate_per_second: 15/s
          - name: surge
            duration_seconds: 7m
            rate_per_second: 120/s
          - name: recovery
            duration_seconds: 5m
            rate_per_second: 18/s

# ── The bundled contract (unified grammar, axis-dsl §4.3) ─────────────────────────────────────
# `positions:` are the claim ANCHORS — each a named coordinate vector plus the border read AT
# it. The instrument below is what every one of those claims is pinned to.
contract_scenario:
  reference_scenario: insight-sudden-traffic-spike
  pyramid_config:
    raw_ring_capacity: 13
    ladder:
      levels: 3
    raw_strides:
    - lookback_windows: 2
    - lookback_windows: 5
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  positions:
  - name: pre-spike
    coordinates:
      time_axis: 150s
    signal:
      must_not_fire:
      - coordinate: RAW.acute . Spk . template_count
        scope:
          template: "GET /checkout"

  - name: spiked
    coordinates:
      time_axis: 320s
    signal:
      must_fire:
      - coordinate: RAW.acute . Spk . template_count
        scope:
          template: "GET /checkout"
    interpretation:
      must_not_emit:
      - any: true
