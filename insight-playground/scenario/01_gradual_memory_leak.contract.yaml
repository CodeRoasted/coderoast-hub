# 01_gradual_memory_leak
# Contract — what it asserts: True-negative: the slow trend stays below the alerting threshold (gradual trends need a slope detector, not a drift detector) — pinned so a future trend detector flips it.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/01_gradual_memory_leak.yaml
  target_seconds: 1800
  axis: time
  pyramid_config:
    raw_ring_capacity: 13
    ladder: { levels: 3 }
    raw_strides: [{ lookback_windows: 2 }, { lookback_windows: 5 }]
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  criticite:
    kind: invariant
  seeds: [42]

signal:
  must_fire: []
  must_not_fire:
    - "* . * . *"

interpretation:
  cube_a:
    upper: []
  must_not_emit:
    - { any: true }

