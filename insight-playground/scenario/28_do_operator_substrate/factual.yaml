# 28_do_operator_substrate  (factual arm)
# Scenario — what it does: An incident raises one service's error rate; a paired run removes the incident (the cause).
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

scenario:
  name: insight-do-operator-substrate-factual
  seed: 2828

  clock:
    mode: virtual
  duration_seconds: 10s

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_do_op_factual
      format: kv
      shm_slot_count: 256
      shm_backpressure_policy: block

  agents:
    - name: gateway
      intent: web_server
      rate_per_second: 0
    - name: payments
      intent: service
      rate_per_second: 0
    - name: notifier
      intent: service
      rate_per_second: 0

  incidents:
    - name: payments_outage
      trigger: "time > 0.5s"
      duration_seconds: 60s
      effects:
        - target: payments
          error_rate: 1.0

  flows:
    - name: settle
      instance_rate_per_second: 5/s
      start_delay_seconds: 1s
      max_concurrent: 1
      correlation_field: trace_id
      start: ingress
      states:
        ingress:
          agent: gateway
          message_template: "accept settle request"
          fields:
            - { name: component, generator: static, value: gateway }
        process:
          agent: payments
          message_template: "settle order total"
          fields:
            - { name: component, generator: static, value: payments }
        notify:
          agent: notifier
          error_rate: 1.0
          message_template: "publish settlement event"
          fields:
            - { name: component, generator: static, value: notifier }
        egress:
          agent: gateway
          message_template: "settle response ok"
          fields:
            - { name: component, generator: static, value: gateway }
      transitions:
        - { from: ingress, to: process, network_latency_ms: 2 }
        - { from: process, to: notify,  network_latency_ms: 3 }
        - { from: notify,  to: egress,  network_latency_ms: 2 }
