# 10_lone_fatal_in_tail
# Contract — what it asserts: The lone tail fatal is surfaced via the tail summary.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/10_lone_fatal_in_tail.yaml
  target_seconds: 240
  axis: time
  windows:
    mode: single
  pyramid_config:
    raw_ring_capacity: 13
    ladder: { levels: 1 }
    raw_strides: []
  metalog_config:
    top_k_size: 64
    reservoir_size: 64

signal:
  must_fire:
    - coordinate: RAW.now . Rsv . salience
      emits: NewErrorPattern
      scope: { template: "exit code" }
  control_arms:
    - name: reservoir_disabled
      metalog_config: { top_k_size: 64, reservoir_size: 0 }
      must_not_fire:
        - RAW.now . Rsv . salience

