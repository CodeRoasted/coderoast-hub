# 33_where_attribution_stray_floor
# Contract — what it asserts: Attribution does not over-claim below a noise floor.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  axis: diff
  inputs:
    baseline: scenario/33_where_attribution_stray_floor/baseline.log
    changed:  scenario/33_where_attribution_stray_floor/changed.log

interpretation:
  ranked_changes:
    must_fire:
      - { where: absent }
    must_not_emit:
      - { where: "myapp" }

