# 09_raw_app_stdout
# Contract — what it asserts: Detection works on plain-text logs, not only on structured ones.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/09_raw_app_stdout.yaml
  target_seconds: 180
  axis: time
  windows:
    mode: segmented
    boundaries_seconds: [60, 120]
  pyramid_config:
    raw_ring_capacity: 13
    ladder: { levels: 1 }
    raw_strides: []
  explain_min_confidence: 0.75
  criticite:
    kind: invariant
  seeds: [default]

signal:
  per_window:
    - window: 0
      must_not_fire:
        - "* . * . *"
    - window: 1
      must_fire:
        - coordinate: RAW.acute . Nep . acute_new_templates
          scope: { template: "connection refused" }
          polarity: onset
      must_not_fire:
        - RAW.acute . Spk . template_count
    - window: 2
      must_fire:
        - coordinate: RAW.acute . Seq . ngram_presence
          emits: VanishedTemplate
          scope: { template: "ERROR connection refused" }
          polarity: recovery
      must_not_fire:
        - RAW.acute . Nep . acute_new_templates

interpretation:
  cube_a:
    upper:
      - { level: ERROR }
  composite:
    severity: High
  must_not_emit:
    - { severity: Critical }

