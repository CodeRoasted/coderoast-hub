# 30_do_operator_fanout
# Contract — what it asserts: Causal attribution holds across fan-out.
#
# ONE bundled file (axis-dsl §4.2): `deterministic_scenario` declares the world AND the
# intervention (the causal_axis edge — the SINGLE source of truth); `contract_scenario`
# declares POSITIONS (nodes) and TRANSITIONS (edges) over them. The counterfactual
# position 'ablated' is DERIVED (coordinate 'ablate-payments-outage'), never authored. See insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: insight-do-operator-fanout
  seed: 3030

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_do_op_fanout
      format: kv
      shm_slot_count: 256
      shm_backpressure_policy: block

  causal_axis:
    edges:
      - name: ablate-payments-outage
        remove: [ incidents.payments_outage ]
    time_axis:
      duration_seconds: 10s
      agents:
        - name: gateway
          intent: web_server
          rate_per_second: 0
        - name: payments
          intent: service
          rate_per_second: 0
        - name: notifier
          intent: service
          rate_per_second: 0

      incidents:
        - name: payments_outage
          trigger: "time > 0.5s"
          duration_seconds: 60s
          effects:
            - target: payments
              error_rate: 1.0

      flows:
        - name: settle
          instance_rate_per_second: 20/s
          start_delay_seconds: 1s
          max_concurrent: 1
          correlation_field: trace_id
          start: ingress
          states:
            ingress:
              agent: gateway
              message_template: "accept settle request"
              fields:
                - {name: component, generator: static, value: gateway}
            pay_card:
              agent: payments
              message_template: "charge via card"
              fields:
                - {name: component, generator: static, value: card}
            pay_wallet:
              agent: payments
              message_template: "charge via wallet"
              fields:
                - {name: component, generator: static, value: wallet}
            pay_bank:
              agent: payments
              message_template: "charge via bank"
              fields:
                - {name: component, generator: static, value: bank}
            notify:
              agent: notifier
              error_rate: 1.0
              message_template: "publish settlement event"
              fields:
                - {name: component, generator: static, value: notifier}
            egress:
              agent: gateway
              message_template: "settle response ok"
              fields:
                - {name: component, generator: static, value: gateway}
          transitions:
            - {from: ingress, to: pay_card, weight: 1.0, network_latency_ms: 2}
            - {from: ingress, to: pay_wallet, weight: 1.0, network_latency_ms: 2}
            - {from: ingress, to: pay_bank, weight: 1.0, network_latency_ms: 2}
            - {from: pay_card, to: notify, network_latency_ms: 3}
            - {from: pay_wallet, to: notify, network_latency_ms: 3}
            - {from: pay_bank, to: notify, network_latency_ms: 3}
            - {from: notify, to: egress, network_latency_ms: 2}

contract_scenario:
  reference_scenario: insight-do-operator-fanout

  invariant:
    - cube_a: { level: ERROR, where: [notifier] }

  positions:
    - name: factual
      coordinates: { causal_axis: null, time_axis: 10s }
    - name: ablated
      coordinates: { causal_axis: ablate-payments-outage, time_axis: 10s }

  transitions:
    - from: factual
      to: ablated
      compare: RAW.run
      expect:
        collapses:
          - cube_a: { level: ERROR, where: [card] }
          - cube_a: { level: ERROR, where: [wallet] }
          - cube_a: { level: ERROR, where: [bank] }
        reappears_as:
          - cube_a: { level: INFO, where: [card] }
          - cube_a: { level: INFO, where: [wallet] }
          - cube_a: { level: INFO, where: [bank] }
        untouched_projection:
          exclude_where: [card, wallet, bank]
