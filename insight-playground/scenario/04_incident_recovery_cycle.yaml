# 04_incident_recovery_cycle
# Scenario — what it does: A service that goes healthy -> incident -> recovered within one window.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: "incident-recovery-cycle"
  seed: 42

  clock:
    mode: virtual

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_incident_recovery
      shm_slot_count: 256
      shm_backpressure_policy: block
  duration_seconds: 30m

  environment:
    region: us-east-1
    cluster: prod-payments
    version: v3.1.0

  agents:
    - name: payment-api
      intent: api_service
      rate_per_second: 120/s
      error_rate: 0.005
      latency_ms: [5, 40]
      level_weights: {debug: 0.04, info: 0.76, warn: 0.20, error: 0.80, fatal: 0.20}
      message_template: "{method} /v1/payments/{endpoint} -> {status_code}"
      fields:
        - name: method
          generator: weighted_choice
          values: [POST, GET, PUT]
          weights: [70, 20, 10]
        - name: endpoint
          generator: weighted_choice
          values: [charge, refund, status, authorize, capture]
          weights: [45, 15, 25, 10, 5]
        - name: status_code
          generator: weighted_choice
          values: ["200", "201", "400", "422", "500", "503"]
          weights: [60, 15, 8, 7, 6, 4]
          level_overrides:
            "500": error
            "503": error
            "422": warn
            "400": warn

      phases:
        - name: healthy
          duration_seconds: 10m
          rate_per_second: 120/s
          error_rate: 0.005
          latency_ms: [5, 40]

        - name: incident
          duration_seconds: 10m
          rate_per_second: 95/s
          error_rate: 0.45
          latency_ms:
            distribution: percentile
            p50: 180
            p95: 2400
            p99: 8000

        - name: recovery
          duration_seconds: 10m
          rate_per_second: 118/s
          error_rate: 0.008
          latency_ms: [6, 55]

    - name: postgres-primary
      intent: database
      rate_per_second: 200/s
      error_rate: 0.002
      latency_ms: [2, 15]
      level_weights: {debug: 0.05, info: 0.85, warn: 0.10, error: 1.0}
      message_template: "{query_type} {schema}.{table}: {rows_affected} rows in {duration_ms} ms"
      fields:
        - name: query_type
          generator: weighted_choice
          values: [SELECT, INSERT, UPDATE, DELETE, BEGIN, COMMIT]
          weights: [50, 20, 15, 8, 4, 3]
        - name: schema
          generator: choice
          values: [payments, accounts]
        - name: table
          generator: weighted_choice
          values: [transactions, payment_intents]
          weights: [60, 40]
        - name: rows_affected
          generator: range
          min: 0
          max: 500
          integer: true
        - name: duration_ms
          generator: range
          min: 1
          max: 50
          integer: true

      phases:
        - name: healthy
          duration_seconds: 10m
          rate_per_second: 200/s
          error_rate: 0.002
          latency_ms: [2, 15]

        - name: overloaded
          duration_seconds: 10m
          rate_per_second: 35/s
          error_rate: 0.88
          latency_ms:
            distribution: percentile
            p50: 4500
            p95: 15000
            p99: 30000

        - name: recovering
          duration_seconds: 10m
          rate_per_second: 190/s
          error_rate: 0.01
          latency_ms: [3, 25]

  incidents:
    - name: db_connection_pool_exhausted
      trigger: "time > 10m"
      duration_seconds: 10m
      effects:
        - target: postgres-primary
          latency_multiplier: 120
          error_rate: 0.88
        - target: payment-api
          latency_multiplier: 6
          error_rate: 0.45

insight:
  detection:
    pyramid:
      time_to_maturity: 10m
  explain:
    mode: rules
