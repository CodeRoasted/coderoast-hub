# 08_baseline_steady_state
# Scenario — what it does: A healthy service in steady state.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

deterministic_scenario:
  name: insight-baseline-steady-state
  seed: 42

  outputs:
    - name: insight-stream
      type: insight_shm
      channel: ipl_baseline_steady
      shm_slot_count: 256
      shm_backpressure_policy: block

  time_axis:
    duration_seconds: 60m
    agents:
      - name: api-gateway
        intent: web_server
        rate_per_second: 25.0
        message_template: "{method} {path} -> {status_code}"
        fields:
          - name: method
            generator: weighted_choice
            values: [GET, POST, PUT, DELETE]
            weights: [70, 20, 7, 3]
          - name: path
            generator: weighted_choice
            values: [/api/users, /api/orders, /api/products, /health]
            weights: [35, 30, 25, 10]
          - name: status_code
            generator: weighted_choice
            values: ["200", "201", "400", "404", "500"]
            weights: [78, 10, 7, 3, 2]

      - name: order-service
        intent: api_service
        rate_per_second: 20.0
        message_template: "{operation} {entity} -> {outcome}"
        fields:
          - name: operation
            generator: weighted_choice
            values: [fetch, create, update, validate]
            weights: [45, 30, 15, 10]
          - name: entity
            generator: weighted_choice
            values: [order, payment, shipment, customer]
            weights: [40, 30, 20, 10]
          - name: outcome
            generator: weighted_choice
            values: [ok, not_found, invalid, error]
            weights: [88, 6, 4, 2]

      - name: postgres
        intent: database
        rate_per_second: 12.0
        message_template: "{query_type} {table} {rows} rows {duration_ms} ms"
        fields:
          - name: query_type
            generator: weighted_choice
            values: [SELECT, INSERT, UPDATE, DELETE]
            weights: [55, 25, 15, 5]
          - name: table
            generator: weighted_choice
            values: [orders, payments, users, sessions]
            weights: [40, 30, 20, 10]
          - name: rows
            generator: range
            min: 0
            max: 50
            integer: true
          - name: duration_ms
            generator: range
            min: 1
            max: 25
            integer: true

# ── The bundled contract (unified grammar, axis-dsl §4.3) ─────────────────────────────────────
# `positions:` are the claim ANCHORS — each a named coordinate vector plus the border read AT
# it. The instrument below is what every one of those claims is pinned to.
contract_scenario:
  reference_scenario: insight-baseline-steady-state
  pyramid_config:
    raw_ring_capacity: 13
    ladder:
      levels: 3
    raw_strides:
    - lookback_windows: 2
    - lookback_windows: 5
  metalog_config:
    top_k_size: 128
    ngram_size: 3
    max_ngram_keys: 16384
    max_param_histograms: 4
    max_histogram_values: 8
  sequence:
    branching_delta_threshold_bits: 3.5
  explain_min_confidence: 0.75
  positions:
  - name: steady
    coordinates:
      time_axis: 705s
    signal:
      must_fire: []
      must_not_fire:
      - "* . * . *"

    interpretation:
      cube_a:
        upper: []
      must_not_emit:
      - any: true
