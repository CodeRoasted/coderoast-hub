# 30_do_operator_fanout
# Contract — what it asserts: Causal attribution holds across fan-out.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  axis: do
  do_pair:
    factual:        scenario/30_do_operator_fanout/factual.yaml
    counterfactual: scenario/30_do_operator_fanout/ablated.yaml
  target_seconds: 10

do:
  causal:
    intervention: { kind: ablate_incident, target: { incident: payments_outage } }
    expect:
      collapses:
        - cube_a: { level: ERROR, where: [card] }
        - cube_a: { level: ERROR, where: [wallet] }
        - cube_a: { level: ERROR, where: [bank] }
      reappears_as:
        - cube_a: { level: INFO, where: [card] }
        - cube_a: { level: INFO, where: [wallet] }
        - cube_a: { level: INFO, where: [bank] }

  control:
    intervention: { kind: ablate_incident, target: { incident: payments_outage } }
    invariant:
      - cube_a: { level: ERROR, where: [notifier] }

  minimal_intervention:
    untouched_projection: { exclude_where: [card, wallet, bank] }

