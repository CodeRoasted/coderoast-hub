# 38_spike_corroborant_admission
# Contract — what it asserts: A spike is admitted only with a corroborant, never alone.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  scenario: scenario/38_spike_corroborant_admission.yaml
  target_seconds: 2050
  axis: time
  pyramid_config:
    ladder: { levels: 3, ring_depth: 4 }
    raw_strides: [{ lookback_windows: 2 }, { lookback_windows: 5 }]
    disjoint: [{ level: 2, separation: 1 }, { level: 2, separation: 3 }]
  metalog_config: { top_k_size: 128, max_param_histograms: 4, max_histogram_values: 8 }
  explain_min_confidence: 0.75

signal:
  must_fire:
    - RAW.acute . Spk . template_count
    - DISJOINT.L2.s3 . Fld.dist . field_jsd
    - envelope . Cmp(branch=C, band=sub_floor) . fired_set
  must_not_fire:
    - envelope . Cmp(band=surfacing) . fired_set
  control_arms:
    - name: no_spike
      scenario: scenario/38_spike_corroborant_control.yaml
      must_fire:
        - DISJOINT.L2.s3 . Fld.dist . field_jsd
      must_not_fire:
        - envelope . Cmp . fired_set
