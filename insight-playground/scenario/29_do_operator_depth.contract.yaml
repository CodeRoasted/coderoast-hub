# 29_do_operator_depth
# Contract — what it asserts: Causal attribution holds through depth.
#
# A LogCraft scenario / declarative contract — see insight-playground/HOW_TO_READ.md.

meta:
  axis: do
  do_pair:
    factual:        scenario/29_do_operator_depth/factual.yaml
    counterfactual: scenario/29_do_operator_depth/ablated.yaml
  target_seconds: 10
  cube_input: { emit_cube: true }
  criticite:
    kind: invariant
  seeds: [2929]

do:
  causal:
    intervention: { kind: ablate_incident, target: { incident: settle_cascade } }
    expect:
      collapses:
        - cube_a: { level: ERROR, where: [payments] }
        - cube_a: { level: ERROR, where: [ledger] }
        - cube_a: { level: ERROR, where: [fulfillment] }
      reappears_as:
        - cube_a: { level: INFO, where: [payments] }
        - cube_a: { level: INFO, where: [ledger] }
        - cube_a: { level: INFO, where: [fulfillment] }

  control:
    intervention: { kind: ablate_incident, target: { incident: settle_cascade } }
    invariant:
      - cube_a: { level: ERROR, where: [notifier] }

  minimal_intervention:
    untouched_projection: { exclude_where: [payments, ledger, fulfillment] }

