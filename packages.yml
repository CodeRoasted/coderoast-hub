packages:
  # The public InSight scenario + contract corpus, content only (CC-BY-4.0). No code.
  # Consumed by insight-eidos's private e2e harness (insight_playground, test_requires) and
  # served read-only at runtime by coderoast-server. The single source of truth for the
  # scenarios — the rest of coderoast-hub (logcraft-playground, benchmarks, workflows) stays
  # pure content with no conanfile.
  insight_scenarios:
    path: insight-playground
    version: 1.7.1
    public: true
    release: true
    depends: []
