# Spans 02 — Dropped branch (GREEN / both branches)
# The `dispatch` trace fans out root → {email, sms}. Its red twin drops the sms branch.
# `fan_out: true` makes root spawn one concurrent child span per outgoing edge.
# Concepts: format: otel_span, fan_out, matched control.

scenario:
  name: span-dropped-green
  seed: 4242
  duration_seconds: 0.5

  outputs:
    - { name: spans, type: console, format: otel_span }

  agents:
    - { name: svc, type: service, rate_per_second: 0, log_level: info }

  flows:
    - name: heartbeat            # control — identical in green and red
      instance_rate_per_second: 1/s
      max_concurrent: 1
      correlation_field: trace_id
      start: hb_open
      states:
        hb_open:  { agent: svc, message_template: "hb open" }
        hb_close: { agent: svc, message_template: "hb close" }
      transitions:
        - { from: hb_open, to: hb_close }

    - name: dispatch             # target — fans out to two branches
      instance_rate_per_second: 1/s
      max_concurrent: 1
      correlation_field: trace_id
      start: root
      states:
        root:  { agent: svc, message_template: "root", fan_out: true }
        email: { agent: svc, message_template: "email" }
        sms:   { agent: svc, message_template: "sms" }
      transitions:
        - { from: root, to: email }
        - { from: root, to: sms }
